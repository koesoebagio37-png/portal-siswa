<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Data Ortu - Comfort & Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                        cyber: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        'void': '#050505',
                        'cyber-dark': '#0a0f14',
                        'glass': 'rgba(15, 23, 42, 0.6)',
                        'neon-blue': '#00f3ff',
                        'neon-green': '#00ff9d',
                        'neon-red': '#ff0055',
                        'neon-purple': '#b026ff',
                    },
                    boxShadow: {
                        'neon-blue': '0 0 10px rgba(0, 243, 255, 0.5)',
                        'neon-green': '0 0 10px rgba(0, 255, 157, 0.5)',
                        'neon-red': '0 0 10px rgba(255, 0, 85, 0.5)',
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, boxShadow: '0 0 20px rgba(0, 243, 255, 0.5)' },
                            '50%': { opacity: .7, boxShadow: '0 0 10px rgba(0, 243, 255, 0.2)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 25%), 
                radial-gradient(circle at 85% 30%, rgba(176, 38, 255, 0.08), transparent 25%);
            color: #e2e8f0;
        }
        .cyber-card {
            background: rgba(10, 15, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .cyber-input {
            background: rgba(5, 5, 5, 0.8);
            border: 1px solid #334155;
            color: #00f3ff;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s ease;
        }
        .cyber-input:focus {
            border-color: #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            outline: none;
        }
        .cyber-btn {
            background: linear-gradient(90deg, #00f3ff, #0066ff);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .cyber-btn:hover {
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
            transform: translateY(-2px);
        }
        .cyber-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }
        
        /* Loading Overlay */
        .loading-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }
        .loader {
            border: 4px solid rgba(0, 243, 255, 0.1);
            border-left-color: #00f3ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center loading-overlay hidden">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-neon-blue font-mono animate-pulse" id="loading-text">MENGHUBUNGKAN...</p>
        </div>
    </div>

    <div class="cyber-card w-full max-w-md rounded-2xl p-8 relative overflow-hidden">
        <!-- Decorative Elements -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-neon-blue to-transparent"></div>
        <div class="absolute bottom-0 right-0 w-20 h-20 bg-neon-purple opacity-20 blur-3xl rounded-full"></div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold font-cyber text-transparent bg-clip-text bg-gradient-to-r from-neon-blue to-white mb-2">DATA CENTER</h1>
            <p class="text-gray-400 text-xs font-mono">PEMBARUAN KONTAK WALI MURID</p>
        </div>

        <!-- STEP 1: VERIFIKASI SISWA -->
        <div id="step-1" class="space-y-6">
            <div class="relative">
                <label class="block text-neon-blue text-xs font-bold mb-2 tracking-wider">NOMOR INDUK SISWA (NIS)</label>
                <input type="text" id="student-nis" placeholder="Contoh: 2425.10.001" 
                    class="cyber-input w-full p-4 rounded-xl text-lg text-center tracking-widest placeholder-gray-700" 
                    maxlength="11" oninput="formatNIS(this)">
                <p class="text-[10px] text-gray-500 mt-2 text-center">*Ketik angka saja, titik otomatis muncul.</p>
            </div>
            
            <button onclick="checkStudent()" class="cyber-btn w-full py-4 rounded-xl shadow-neon-blue">
                Cari Data Siswa
            </button>
        </div>

        <!-- STEP 2: INPUT WA -->
        <div id="step-2" class="hidden space-y-6 animate-fade-in">
            <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700 text-center">
                <p class="text-gray-400 text-xs mb-1">DATA DITEMUKAN</p>
                <h2 id="display-name" class="text-xl font-bold text-white font-cyber">NAMA SISWA</h2>
                <p id="display-class" class="text-neon-green text-sm font-mono mt-1">KELAS X-1</p>
            </div>

            <div>
                <label class="block text-neon-blue text-xs font-bold mb-2 tracking-wider">NOMOR WHATSAPP WALI MURID</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-mono text-lg">+62</span>
                    <input type="tel" id="parent-wa" placeholder="81234567890" 
                        class="cyber-input w-full p-4 pl-14 rounded-xl text-lg tracking-wide placeholder-gray-700">
                </div>
                <p class="text-[10px] text-gray-500 mt-2 text-center">*Pastikan nomor aktif dan terhubung ke WhatsApp.</p>
            </div>

            <div class="flex gap-3">
                <button onclick="resetForm()" class="flex-1 py-3 rounded-xl border border-gray-600 text-gray-400 hover:bg-gray-800 transition text-xs font-bold">KEMBALI</button>
                <button onclick="saveData()" class="flex-[2] cyber-btn py-3 rounded-xl shadow-neon-blue">SIMPAN DATA</button>
            </div>
        </div>

        <!-- STEP SUCCESS -->
        <div id="step-success" class="hidden text-center py-10 animate-bounce-in">
            <div class="w-20 h-20 bg-neon-green/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-neon-green shadow-neon-green">
                <svg class="w-10 h-10 text-neon-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2 font-cyber">BERHASIL!</h3>
            <p class="text-gray-400 text-sm mb-8">Data kontak telah diperbarui di server pusat.</p>
            <button onclick="resetForm()" class="text-neon-blue text-xs font-bold hover:underline">UPDATE DATA LAIN</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG (SAMA DENGAN FILE PIKET)
        const firebaseConfig = {
            apiKey: "AIzaSyAwIwimlyrE4qQqYa2gA8Pfygd59USsveQ",
            authDomain: "aplikasi-ulangan-01.firebaseapp.com",
            projectId: "aplikasi-ulangan-01",
            storageBucket: "aplikasi-ulangan-01.firebasestorage.app",
            messagingSenderId: "409085062439",
            appId: "1:409085062439:web:280589d1a3e12e7b980d02",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentStudentId = null;

        // FUNGSI AUTO FORMAT NIS (UNTUK HP TANPA TITIK)
        window.formatNIS = (input) => {
            // 1. Hapus semua karakter selain angka
            let val = input.value.replace(/\D/g, '');
            
            // 2. Tambahkan titik secara otomatis
            // Format: XXXX.XX.XXX (4 digit, titik, 2 digit, titik, 3 digit)
            if (val.length > 4) {
                val = val.substring(0, 4) + '.' + val.substring(4);
            }
            if (val.length > 7) { // 4 digit + 1 titik + 2 digit = 7 chars
                val = val.substring(0, 7) + '.' + val.substring(7);
            }
            
            // Batasi panjang maksimal (misal 9 digit angka + 2 titik = 11 karakter)
            input.value = val;
        };

        window.checkStudent = async () => {
            const nisInput = document.getElementById('student-nis').value.trim();
            
            // Validasi format sederhana (harus mengandung titik jika pakai format baku)
            if (nisInput.length < 5) {
                alert("Mohon masukkan NIS dengan benar.");
                return;
            }

            showLoading(true, "MENCARI DATA...");

            try {
                // Asumsi: ID Dokumen di Firestore == NIS Siswa (ex: "2425.10.001")
                // Jika ID Dokumen berbeda, perlu query where('nis', '==', nisInput)
                // Disini kita coba akses langsung by ID (sesuai struktur umum aplikasi ini)
                
                const docRef = doc(db, 'siswa', nisInput);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentStudentId = nisInput;
                    
                    document.getElementById('display-name').innerText = data.nama || "Siswa Tanpa Nama";
                    document.getElementById('display-class').innerText = data.kelas || "Kelas -";
                    
                    // Pre-fill jika sudah ada no hp sebelumnya
                    if(data.hp_ortu) {
                        // Hapus +62 atau 0 di depan untuk tampilan
                        let existing = data.hp_ortu.replace(/^(\+62|62|0)/, '');
                        document.getElementById('parent-wa').value = existing;
                    } else {
                        document.getElementById('parent-wa').value = '';
                    }

                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                } else {
                    alert("Data Siswa tidak ditemukan! Pastikan NIS benar (termasuk titik).");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Terjadi kesalahan koneksi: " + error.message);
            } finally {
                showLoading(false);
            }
        };

        window.resetForm = () => {
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-success').classList.add('hidden');
            document.getElementById('student-nis').value = '';
            document.getElementById('parent-wa').value = '';
            currentStudentId = null;
        };

        window.saveData = async () => {
            const waRaw = document.getElementById('parent-wa').value.trim();
            
            if (waRaw.length < 8) {
                alert("Nomor WhatsApp tidak valid.");
                return;
            }

            // Normalisasi (opsional, tapi bagus untuk konsistensi)
            // Jika user mengetik 628..., biarkan. Jika 08..., biarkan.
            // Aplikasi guru nanti yang akan handle formatnya.
            const wa = waRaw.replace(/\D/g, ''); // Hanya angka

            showLoading(true, "MENYIMPAN DATA...");

            try {
                const studentRef = doc(db, 'siswa', currentStudentId);
                
                // Update field 'hp_ortu' agar sesuai dengan script guru
                await updateDoc(studentRef, {
                    hp_ortu: wa,
                    updated_at: serverTimestamp()
                });

                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');

            } catch (error) {
                console.error("Save error:", error);
                alert("GAGAL MENYIMPAN: " + error.message);
            } finally {
                showLoading(false);
            }
        };

        function showLoading(show, text = "LOADING...") {
            const overlay = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            if (show) {
                txt.textContent = text;
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

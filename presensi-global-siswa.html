<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi Global - Comfort & Glow</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        cyber: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        'deep': '#0f172a', 'surface': '#1e293b', 'primary': '#38bdf8',
                        'accent': '#818cf8', 'success': '#34d399', 'warning': '#fbbf24', 'danger': '#f87171',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        html.dark body {
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.1) 0px, transparent 50%);
        }

        /* PREMIUM GLASS STYLE */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }
        html.dark .glass-panel {
            background: rgba(30, 41, 59, 0.70);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glow-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #cbd5e1;
            color: #1e293b;
            transition: all 0.3s ease;
        }
        .glow-input:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
            outline: none;
        }
        html.dark .glow-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: #ffffff;
        }
        html.dark .glow-input:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.15);
        }

        /* App Container */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
        }
        
        .view-section { display: none; }
        .view-section.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }
        
        .page { display: none; animation: fadeIn 0.4s ease-out forwards; }
        .page.active { display: block; }
        
        .nav-item { color: #64748b; transition: all 0.3s; }
        html.dark .nav-item { color: #94a3b8; }
        .nav-item.active { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .nav-item.active i { font-weight: bold; transform: scale(1.15) translateY(-2px); }
        
        .card-press { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s; }
        .card-press:active { transform: scale(0.96); box-shadow: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0f172a] dark:text-[#f8fafc] transition-colors duration-500">

    <!-- Ambient Background Animation -->
    <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-accent/10 rounded-full blur-[100px] animate-float" style="animation-delay: 3s"></div>
    </div>

    <div class="app-container relative z-10">

        <!-- LOADING SCREEN -->
        <div id="loading-screen" class="fixed inset-0 bg-slate-50/90 dark:bg-deep/90 z-[100] flex flex-col items-center justify-center backdrop-blur-md transition-opacity duration-500">
            <div class="w-20 h-20 border-4 border-slate-300 dark:border-slate-700 border-t-primary rounded-full animate-spin mb-6"></div>
            <p class="text-sm text-primary font-mono font-bold tracking-[0.2em] uppercase animate-pulse">Menghubungkan Server...</p>
            <p id="loading-timeout-msg" class="text-xs text-danger mt-4 hidden font-mono">Koneksi lambat... Memuat mode offline.</p>
        </div>

        <!-- 1. VIEW LOGIN -->
        <div id="view-login" class="view-section flex-col items-center justify-center min-h-screen p-6">
            <div class="glass-panel rounded-3xl p-8 w-full text-center relative overflow-hidden shadow-2xl">
                <!-- Top Accent Line -->
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-accent to-primary"></div>
                
                <div class="w-20 h-20 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-6 border border-primary/20 shadow-[0_0_20px_rgba(56,189,248,0.2)]">
                    <i class="ph ph-buildings text-5xl"></i>
                </div>
                
                <h1 class="text-2xl font-bold font-cyber tracking-tight text-slate-900 dark:text-white mb-2">PRESENSI PIKET</h1>
                <p class="text-slate-500 dark:text-slate-400 text-xs tracking-widest uppercase mb-10">Gerbang Utama Sekolah</p>

                <form onsubmit="studentApp.saveNis(event)" class="w-full space-y-6">
                    <div>
                        <input type="tel" id="input-nis" oninput="studentApp.formatNIS(this)" maxlength="11"
                            class="glow-input w-full p-5 rounded-2xl text-center text-xl font-bold font-mono tracking-[0.2em] placeholder-slate-400 dark:placeholder-slate-500" 
                            placeholder="NIS SISWA">
                        <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-2 text-center">*Ketik angka saja, titik otomatis muncul.</p>
                        
                        <div id="login-error-msg" class="hidden mt-4 p-3 bg-danger/10 border border-danger/20 rounded-xl">
                            <p class="text-center text-danger text-xs font-bold font-mono" id="error-text">NIS tidak ditemukan.</p>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-login-submit" class="w-full py-4 rounded-2xl bg-gradient-to-r from-primary to-accent hover:to-indigo-500 text-white font-bold shadow-lg shadow-primary/30 transition-all transform active:scale-95 tracking-wider uppercase text-sm">
                        Masuk Sekarang
                    </button>
                </form>
            </div>
        </div>

        <!-- 2. MAIN APP WRAPPER -->
        <div id="main-app" class="hidden flex-col min-h-screen">
            
            <header class="pt-10 pb-6 px-6 glass-panel sticky top-0 z-40 rounded-b-3xl shadow-[0_10px_30px_-10px_rgba(0,0,0,0.1)] dark:shadow-[0_10px_30px_-10px_rgba(0,0,0,0.5)]">
                <!-- Theme Toggle -->
                <button onclick="window.toggleTheme()" class="absolute top-6 right-6 p-2 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl text-slate-600 dark:text-slate-300 hover:text-primary transition-all border border-white/20">
                    <i class="ph ph-moon dark:hidden text-lg"></i>
                    <i class="ph ph-sun hidden dark:block text-lg"></i>
                </button>

                <div class="flex items-center gap-4 mt-2">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white font-bold text-xl shadow-lg border-2 border-white/20" id="header-avatar">
                        S
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h2 id="display-name" class="text-lg font-bold text-slate-900 dark:text-white truncate">Nama Siswa</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="px-2 py-0.5 bg-success/10 border border-success/20 text-success text-[10px] font-bold rounded-full uppercase tracking-wider flex items-center gap-1">
                                <span class="w-1.5 h-1.5 bg-success rounded-full animate-pulse"></span> Aktif
                            </span>
                            <span id="display-nis" class="text-xs font-mono text-slate-500 dark:text-slate-400">NIS</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- HALAMAN: BERANDA -->
            <div id="page-home" class="page active p-6 space-y-6">
                <div id="attendance-status-card" class="glass-panel p-8 rounded-3xl text-center space-y-5 relative overflow-hidden transition-all duration-500">
                    <!-- Default State Decor -->
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>
                    
                    <div id="status-icon" class="w-20 h-20 bg-primary/10 border border-primary/20 text-primary rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner relative z-10">
                        <i class="ph ph-qr-code"></i>
                    </div>
                    
                    <div class="relative z-10">
                        <h3 id="status-title" class="text-2xl font-bold font-cyber tracking-tight text-slate-900 dark:text-white">SIAP PRESENSI</h3>
                        <p id="status-desc" class="text-slate-500 dark:text-slate-400 text-xs mt-1">Masukkan Token Piket hari ini.</p>
                    </div>

                    <form id="form-token" onsubmit="studentApp.checkIn(event)" class="pt-6 relative z-10">
                        <input type="tel" id="token-input" maxlength="3" placeholder="---" 
                            class="glow-input w-full text-center text-5xl font-bold font-mono tracking-[0.5em] p-6 rounded-2xl mb-6 uppercase">
                        <button type="submit" id="btn-checkin" class="w-full bg-gradient-to-r from-primary to-accent hover:to-indigo-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/30 transition transform active:scale-95 tracking-widest uppercase text-sm">
                            ABSEN MASUK
                        </button>
                    </form>
                </div>
            </div>

            <!-- HALAMAN: IZIN -->
            <div id="page-permit" class="page hidden p-6 space-y-6">
                <div class="glass-panel p-6 rounded-3xl space-y-6 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-warning via-orange-500 to-warning opacity-50"></div>
                    
                    <h3 class="font-bold text-lg flex items-center gap-2 text-slate-800 dark:text-white">
                        <div class="p-2 bg-warning/10 text-warning rounded-lg"><i class="ph ph-file-text text-xl"></i></div> 
                        Formulir Izin
                    </h3>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Pilih Keterangan</label>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="studentApp.selectPermitType('s')" id="btn-s" class="permit-type-btn p-3 rounded-xl border border-primary bg-primary/10 text-primary font-bold transition-all text-sm tracking-wider">SAKIT</button>
                                <button onclick="studentApp.selectPermitType('i')" id="btn-i" class="permit-type-btn p-3 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 font-bold transition-all text-sm tracking-wider">IZIN</button>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Alasan Detail</label>
                            <textarea id="permit-reason" rows="3" class="glow-input w-full p-4 rounded-xl text-sm font-sans resize-none" placeholder="Tuliskan keterangan lengkap..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Foto Surat Bukti</label>
                            <label class="block w-full h-32 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl bg-slate-100/50 dark:bg-slate-800/50 hover:border-primary transition-colors cursor-pointer overflow-hidden relative group">
                                <input type="file" id="permit-file" class="hidden" accept="image/*" capture="environment">
                                <div id="upload-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 group-hover:text-primary transition-colors">
                                    <div class="w-10 h-10 bg-white dark:bg-slate-700 rounded-full flex items-center justify-center mb-2 shadow-sm">
                                        <i class="ph ph-camera text-xl"></i>
                                    </div>
                                    <span class="text-[10px] font-bold tracking-wider">AMBIL FOTO SURAT</span>
                                </div>
                                <img id="permit-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                            </label>
                        </div>
                        
                        <button onclick="studentApp.submitPermit()" id="btn-submit-permit" class="w-full bg-gradient-to-r from-warning to-orange-500 hover:to-red-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-warning/20 transition-all transform active:scale-95 tracking-widest uppercase text-sm mt-4">
                            KIRIM LAPORAN
                        </button>
                    </div>
                </div>
            </div>

            <!-- HALAMAN: PROFIL -->
            <div id="page-profile" class="page hidden p-6">
                <div class="glass-panel p-8 rounded-3xl text-center relative overflow-hidden">
                    <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-danger/10 rounded-full blur-3xl"></div>
                    
                    <div class="w-24 h-24 bg-gradient-to-br from-slate-200 to-slate-300 dark:from-slate-700 dark:to-slate-800 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl border-4 border-white/20 shadow-xl relative z-10">
                        <i class="ph ph-user-circle"></i>
                    </div>
                    <h3 id="profile-name" class="text-xl font-bold text-slate-900 dark:text-white relative z-10">...</h3>
                    <p id="profile-nis" class="text-primary text-sm font-mono mb-8 relative z-10">...</p>
                    
                    <button onclick="studentApp.logout()" class="w-full py-4 text-danger font-bold bg-danger/10 border border-danger/20 rounded-2xl hover:bg-danger hover:text-white transition-all transform active:scale-95 tracking-widest uppercase text-sm relative z-10">
                        <i class="ph ph-sign-out mr-2"></i> Keluar Akun
                    </button>
                </div>
                
                <div class="text-center text-[10px] text-slate-400 dark:text-slate-500 font-mono mt-8 uppercase tracking-widest">
                    Global Connect v2.0
                </div>
            </div>

            <!-- MENU NAVIGASI BAWAH -->
            <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-[480px] glass-panel border-t border-white/20 flex justify-around py-3 pb-8 z-50 rounded-t-3xl">
                <button onclick="studentApp.switchPage('home')" class="nav-item active flex flex-col items-center gap-1.5 w-20 py-2">
                    <i class="ph ph-qr-code text-[26px]"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Piket</span>
                </button>
                <button onclick="studentApp.switchPage('permit')" class="nav-item flex flex-col items-center gap-1.5 w-20 py-2">
                    <i class="ph ph-file-text text-[26px]"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Izin</span>
                </button>
                <button onclick="studentApp.switchPage('profile')" class="nav-item flex flex-col items-center gap-1.5 w-20 py-2">
                    <i class="ph ph-user text-[26px]"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Profil</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAwIwimlyrE4qQqYa2gA8Pfygd59USsveQ",
            authDomain: "aplikasi-ulangan-01.firebaseapp.com",
            projectId: "aplikasi-ulangan-01",
            storageBucket: "aplikasi-ulangan-01.firebasestorage.app",
            messagingSenderId: "409085062439",
            appId: "1:409085062439:web:280589d1a3e12e7b980d02",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_ID = 'presensi-sekolah-terintegrasi'; 
        const PATH_CONFIG = `artifacts/${APP_ID}/public/data/config`;
        const PATH_ATTENDANCE = `artifacts/${APP_ID}/public/data/attendance`;
        const PATH_IZIN = `artifacts/${APP_ID}/public/data/izin_global`;

        // --- THEME LOGIC ---
        window.toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage)) || localStorage.theme === undefined) {
            document.documentElement.classList.add('dark');
        } else if (localStorage.theme === 'light') {
            document.documentElement.classList.remove('dark');
        }

        class StudentApp {
            constructor() {
                this.nis = localStorage.getItem('student_nis') || '';
                this.permitType = 's';
                this.studentData = null;
                this.user = null;
                this.permitImageBase64 = null; 

                setTimeout(() => {
                    const loader = document.getElementById('loading-screen');
                    if (loader && !loader.classList.contains('hidden')) {
                        document.getElementById('loading-timeout-msg').classList.remove('hidden');
                        if (!this.user) {
                            setTimeout(() => {
                                loader.classList.add('hidden');
                                this.showView('view-login');
                            }, 2000);
                        }
                    }
                }, 5000);

                this.initAuth();

                onAuthStateChanged(auth, (user) => {
                    this.user = user;
                    if (user) {
                        document.getElementById('loading-screen').classList.add('hidden');
                        if (this.nis) this.initSession();
                        else this.showView('view-login');
                    }
                });

                document.getElementById('permit-file').addEventListener('change', (e) => this.handleFile(e));
            }

            formatNIS(input) {
                let val = input.value.replace(/\D/g, '');
                if (val.length > 4) val = val.substring(0, 4) + '.' + val.substring(4);
                if (val.length > 7) val = val.substring(0, 7) + '.' + val.substring(7);
                input.value = val;
            }

            async initAuth() {
                try {
                    await signInAnonymously(auth);
                } catch (error) { 
                    console.error("Auth Error:", error);
                    document.getElementById('loading-timeout-msg').innerText = "Gagal koneksi server: " + error.message;
                    document.getElementById('loading-timeout-msg').classList.remove('hidden');
                }
            }

            async initSession() {
                const success = await this.loadStudentInfo();
                if (success) {
                    this.showView('main-app');
                    this.checkTodayAttendance();
                } else {
                    this.logout(false);
                    this.showView('view-login');
                }
            }

            showView(id) {
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById('main-app').classList.add('hidden');
                
                if (id === 'main-app') {
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('main-app').classList.add('flex');
                } else {
                    document.getElementById(id).classList.add('active');
                }
            }

            async loadStudentInfo() {
                if (!this.user || !this.nis) return false;
                try {
                    const studentRef = doc(db, 'siswa', this.nis);
                    const snap = await getDoc(studentRef);
                    
                    if (snap.exists()) {
                        this.studentData = snap.data();
                        document.getElementById('display-name').innerText = this.studentData.nama;
                        document.getElementById('display-nis').innerText = "NIS: " + this.nis;
                        document.getElementById('profile-name').innerText = this.studentData.nama;
                        document.getElementById('profile-nis').innerText = "NIS: " + this.nis;
                        document.getElementById('header-avatar').innerText = this.studentData.nama.substring(0,1).toUpperCase();
                        return true;
                    }
                    return false;
                } catch (e) { 
                    console.error(e);
                    return false;
                }
            }

            async checkTodayAttendance() {
                if (!this.user) return;
                const today = new Date().toISOString().split('T')[0];
                const docId = `${today}_${this.nis}`;
                
                try {
                    const piketRef = doc(db, PATH_ATTENDANCE, docId);
                    const snapPiket = await getDoc(piketRef);

                    const izinRef = doc(db, PATH_IZIN, docId);
                    const snapIzin = await getDoc(izinRef);

                    if (snapPiket.exists()) {
                        this.setAttendanceUI(snapPiket.data().status);
                    } else if (snapIzin.exists()) {
                        this.setAttendanceUI(snapIzin.data().tipe === 's' ? 'Sakit' : 'Izin');
                    }
                } catch (e) { console.error(e); }
            }

            setAttendanceUI(status) {
                const card = document.getElementById('attendance-status-card');
                const title = document.getElementById('status-title');
                const desc = document.getElementById('status-desc');
                const form = document.getElementById('form-token');
                const icon = document.getElementById('status-icon');

                form.classList.add('hidden');
                title.innerText = "PRESENSI TERCATAT";
                desc.innerText = `Status Anda: ${status} hari ini.`;
                
                // Hapus kelas background default (glass-panel / border biasa)
                card.className = "p-8 rounded-3xl text-center space-y-5 relative overflow-hidden transition-all duration-500 shadow-2xl animate-fade-in";
                
                if (status === 'Tepat Waktu' || status === 'Hadir') {
                    card.classList.add('bg-gradient-to-br', 'from-success', 'to-emerald-600', 'text-white', 'border', 'border-emerald-400');
                    icon.className = "w-20 h-20 bg-white/20 text-white rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner relative z-10 border border-white/30";
                    icon.innerHTML = '<i class="ph ph-check-circle"></i>';
                } else {
                    card.classList.add('bg-gradient-to-br', 'from-warning', 'to-orange-500', 'text-white', 'border', 'border-orange-400');
                    icon.className = "w-20 h-20 bg-white/20 text-white rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner relative z-10 border border-white/30";
                    icon.innerHTML = '<i class="ph ph-info"></i>';
                }
            }

            async checkIn(event) {
                event.preventDefault();
                const token = document.getElementById('token-input').value.toUpperCase();
                const btn = document.getElementById('btn-checkin');
                
                if (!this.user || token.length < 3) return;

                btn.disabled = true;
                btn.innerText = "MEMVERIFIKASI...";

                try {
                    const sessionRef = doc(db, PATH_CONFIG, 'session');
                    const snap = await getDoc(sessionRef);
                    
                    if (!snap.exists()) throw new Error("Sistem Piket belum aktif.");
                    const { currentToken, lateThreshold } = snap.data();

                    if (token !== currentToken) throw new Error("Token salah! Lihat monitor Piket.");

                    const now = new Date();
                    const [h, m] = (lateThreshold || "07:00").split(':').map(Number);
                    const limit = new Date(now); limit.setHours(h, m, 0, 0);
                    const status = now > limit ? 'Terlambat' : 'Tepat Waktu';

                    const today = now.toISOString().split('T')[0];
                    
                    await setDoc(doc(db, PATH_ATTENDANCE, `${today}_${this.nis}`), {
                        nis: this.nis,
                        nama: this.studentData.nama,
                        kelas: this.studentData.kelas,
                        timestamp: serverTimestamp(),
                        status: status
                    });

                    this.setAttendanceUI(status);
                } catch (err) {
                    alert(err.message);
                    btn.disabled = false;
                    btn.innerText = "ABSEN MASUK";
                }
            }

            selectPermitType(type) {
                this.permitType = type;
                const btnS = document.getElementById('btn-s');
                const btnI = document.getElementById('btn-i');
                
                // Reset Keduanya ke inactive (Cyber style)
                [btnS, btnI].forEach(b => {
                    b.className = "permit-type-btn p-3 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 font-bold transition-all text-sm tracking-wider";
                });
                
                // Set active class
                const activeBtn = document.getElementById('btn-' + type);
                activeBtn.className = "permit-type-btn p-3 rounded-xl border border-primary bg-primary/10 text-primary font-bold transition-all text-sm tracking-wider shadow-[0_0_15px_rgba(56,189,248,0.2)]";
            }

            compressImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; 
                            const MAX_HEIGHT = 800; 
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }

                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.onerror = reject;
                    };
                    reader.readAsDataURL(file);
                });
            }

            async handleFile(e) {
                const file = e.target.files[0];
                if (!file) return;

                const preview = document.getElementById('permit-preview');
                const placeholder = document.getElementById('upload-placeholder');
                
                try {
                    this.permitImageBase64 = await this.compressImage(file);
                    preview.src = this.permitImageBase64;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } catch (err) {
                    console.error("Gagal kompres gambar:", err);
                    alert("Gagal memproses gambar. Coba gambar lain.");
                }
            }

            async submitPermit() {
                const reason = document.getElementById('permit-reason').value.trim();
                const btn = document.getElementById('btn-submit-permit');

                if (!this.user || !reason || !this.permitImageBase64) { 
                    alert("Lengkapi alasan dan foto bukti!"); return; 
                }

                btn.disabled = true;
                btn.innerText = "MENGIRIM DATA...";

                try {
                    const today = new Date().toISOString().split('T')[0];
                    const docId = `${today}_${this.nis}`;
                    
                    await setDoc(doc(db, PATH_IZIN, docId), {
                        nis: this.nis,
                        nama: this.studentData.nama,
                        kelas: this.studentData.kelas,
                        tipe: this.permitType,
                        alasan: reason,
                        foto: this.permitImageBase64,
                        timestamp: serverTimestamp()
                    });

                    alert("Laporan Izin/Sakit Berhasil Terkirim ke Piket!");
                    this.switchPage('home');
                    this.checkTodayAttendance();
                } catch (e) {
                    alert("Gagal: " + e.message);
                    btn.disabled = false;
                    btn.innerText = "KIRIM LAPORAN";
                }
            }

            switchPage(id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-' + id).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                
                // Map nav item activation
                if(id === 'home') document.querySelectorAll('.nav-item')[0].classList.add('active');
                if(id === 'permit') document.querySelectorAll('.nav-item')[1].classList.add('active');
                if(id === 'profile') document.querySelectorAll('.nav-item')[2].classList.add('active');
            }

            async saveNis(e) {
                e.preventDefault();
                const input = document.getElementById('input-nis');
                const errorBox = document.getElementById('login-error-msg');
                const errorText = document.getElementById('error-text');
                const btn = document.getElementById('btn-login-submit');
                const nis = input.value.trim();
                
                if (!nis) return;
                
                errorBox.classList.add('hidden');
                btn.disabled = true;
                btn.innerText = "MENGHUBUNGKAN...";

                try {
                    const studentRef = doc(db, 'siswa', nis);
                    const snap = await getDoc(studentRef);
                    
                    if (snap.exists()) {
                        localStorage.setItem('student_nis', nis);
                        this.nis = nis;
                        this.initSession();
                    } else {
                        errorText.innerText = "NIS Tidak Ditemukan. Cek Kembali.";
                        errorBox.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerText = "MASUK SEKARANG";
                    }
                } catch (err) {
                    console.error(err);
                    errorText.innerText = "Koneksi Gagal. Coba lagi.";
                    errorBox.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "MASUK SEKARANG";
                }
            }

            logout(reload = true) {
                if(confirm("Apakah Anda yakin ingin keluar dari Presensi Piket?")) {
                    localStorage.removeItem('student_nis');
                    this.nis = '';
                    this.studentData = null;
                    if (reload) location.reload();
                }
            }
        }
        window.studentApp = new StudentApp();
    </script>
</body>
</html>
